<!doctype html>
<meta charset="utf-8">
<style>
  html, body, iframe { width: 100%; height: 100%; margin: 0; border: 0; overflow: hidden; }
  output {
    position: fixed;
    z-index: 10;
    right: 1rem;
    bottom: 1rem;
    padding: 0.5rem;
    background: white;
    color: black;
    font: 12px monospace;
  }
</style>
<iframe></iframe>
<output>waiting</output>
<script>
  const frame = document.querySelector("iframe");
  const output = document.querySelector("output");
  const params = new URLSearchParams(location.search);
  let attempts = 0;

  function runCheck() {
    const target = frame.contentDocument?.querySelector(params.get("selector") || ".map-stage");
    if (!target || !target.classList.contains("depth-surface")) {
      attempts += 1;
      if (attempts < 20) setTimeout(runCheck, 200);
      return;
    }

    const win = frame.contentWindow;
    const top = target.getBoundingClientRect().top + win.scrollY - 80;
    win.scrollTo(0, Math.max(0, top));

    setTimeout(() => {
      const rect = target.getBoundingClientRect();
      const pointer = {
        bubbles: true,
        clientX: rect.left + rect.width * 0.82,
        clientY: rect.top + rect.height * 0.24
      };
      target.dispatchEvent(new PointerEvent("pointerenter", pointer));
      target.dispatchEvent(new PointerEvent("pointermove", pointer));

      setTimeout(() => {
        const style = win.getComputedStyle(target);
        output.textContent = JSON.stringify({
          className: target.className,
          rotateX: style.getPropertyValue("--depth-rotate-x").trim(),
          rotateY: style.getPropertyValue("--depth-rotate-y").trim(),
          transform: style.transform
        });
      }, 240);
    }, 120);
  }

  frame.src = "index.html";
  setTimeout(runCheck, 600);
</script>
